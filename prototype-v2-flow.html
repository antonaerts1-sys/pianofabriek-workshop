<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pianofabriek — Prototype V2 (nieuwe flow)</title>
<style>
  :root {
    --ink:#1A1A1A; --muted:#6B7280; --accent:#1A6DFF; --accent-soft:#EFF4FF;
    --ok:#0E9F6E; --ok-soft:#E7F7F0; --warn:#C2410C; --warn-soft:#FFF4ED;
    --bg:#FFFFFF; --surface:#F9FAFB; --border:#E5E7EB;
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--surface);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  [hidden]{display:none!important;} button{font-family:inherit;} a{color:var(--accent);text-decoration:none;}
  input,textarea,select{font-family:inherit;}

  .demo-bar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:24px;}
  .demo-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
  .demo-tabs{display:flex;gap:4px;background:var(--surface);border-radius:8px;padding:4px;}
  .demo-tab{background:transparent;border:none;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;}
  .demo-tab.active{background:var(--bg);color:var(--ink);border:1px solid var(--border);}
  .demo-reset{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:6px 12px;white-space:nowrap;}
  .demo-reset:hover{color:var(--accent);}
  .vbadge{font-size:11px;font-weight:600;color:var(--accent);border:1px solid var(--accent);border-radius:999px;padding:2px 8px;}

  .app{max-width:1040px;margin:32px auto;background:var(--bg);border:1px solid var(--border);border-radius:12px;overflow:hidden;min-height:70vh;}
  .app-top{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;border-bottom:1px solid var(--border);}
  .app-brand{font-size:14px;font-weight:600;}
  .lang{display:inline-flex;border:1px solid var(--border);border-radius:999px;overflow:hidden;}
  .lang button{background:transparent;border:none;color:var(--muted);padding:4px 12px;cursor:pointer;font-size:13px;}
  .lang button.active{background:var(--ink);color:var(--bg);}

  /* progress */
  .body{padding:36px 40px;}
  .prog{display:flex;gap:6px;margin-bottom:26px;flex-wrap:wrap;}
  .prog .dot{height:4px;border-radius:2px;background:var(--border);flex:1;min-width:24px;}
  .prog .dot.on{background:var(--accent);}
  .q{font-size:24px;font-weight:600;letter-spacing:-.01em;margin:0 0 6px;max-width:640px;}
  .qsub{color:var(--muted);margin:0 0 24px;max-width:640px;}

  .field{margin-bottom:22px;max-width:620px;}
  .label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;}
  .label .opt{color:var(--muted);font-weight:400;}
  .hint{font-size:13px;color:var(--muted);margin-top:5px;}
  .input{border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:15px;color:var(--ink);width:100%;outline:none;background:var(--bg);}
  .input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  textarea.input{min-height:84px;resize:vertical;}

  .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:620px;}
  @media(max-width:560px){.cards{grid-template-columns:1fr;}}
  .opt-card{border:1px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;}
  .opt-card:hover{border-color:var(--muted);}
  .opt-card.sel{border-color:var(--accent);background:var(--accent-soft);}
  .opt-card .t{font-weight:600;font-size:15px;}
  .opt-card .d{font-size:13px;color:var(--muted);margin-top:2px;}

  .seg{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .seg button{background:var(--bg);border:none;padding:9px 16px;font-size:14px;color:var(--muted);cursor:pointer;border-right:1px solid var(--border);}
  .seg button:last-child{border-right:none;}
  .seg button.on{background:var(--accent-soft);color:var(--accent);font-weight:500;}

  .stepper-num{display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .stepper-num button{width:38px;height:40px;border:none;background:var(--bg);color:var(--ink);font-size:18px;cursor:pointer;}
  .stepper-num button:hover{background:var(--surface);}
  .stepper-num input{width:56px;height:40px;border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);text-align:center;font-size:15px;outline:none;}

  .actions{display:flex;justify-content:space-between;align-items:center;margin-top:34px;padding-top:22px;border-top:1px solid var(--border);max-width:620px;}
  .btn{border-radius:8px;padding:11px 22px;font-size:15px;font-weight:500;cursor:pointer;}
  .btn-prim{background:var(--accent);color:#fff;border:none;}
  .btn-prim:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}
  .btn-sec{background:var(--bg);color:var(--ink);border:1px solid var(--border);}
  .btn-text{background:transparent;color:var(--accent);border:none;padding:11px 0;font-weight:500;cursor:pointer;font-size:15px;}
  .btn-text:disabled{color:var(--muted);cursor:not-allowed;}

  .notice{border-left:3px solid var(--accent);background:var(--accent-soft);padding:12px 16px;margin:16px 0;max-width:620px;border-radius:0 8px 8px 0;font-size:14px;}
  .notice .nl{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
  .notice.contact{border-left-color:var(--warn);background:var(--warn-soft);}
  .notice.contact .nl{color:var(--warn);}

  /* rooms availability */
  .room-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:620px;}
  @media(max-width:560px){.room-list{grid-template-columns:1fr;}}
  .room{border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;}
  .room:hover{border-color:var(--muted);}
  .room.sel{border-color:var(--accent);}
  .room .ph{height:60px;background:linear-gradient(135deg,#E9EDF5,#D7DDEA);}
  .room .ri{padding:12px 14px;}
  .room .rn{font-weight:600;font-size:14px;}
  .room .rd{font-size:12px;color:var(--muted);margin-top:2px;}
  .room .rav{font-size:12px;color:var(--ok);font-weight:600;margin-top:6px;}
  .room .more{font-size:12px;color:var(--accent);margin-top:6px;display:inline-block;}
  .room.sel .rn::after{content:' ✓';color:var(--accent);}

  /* gated food/drink */
  .gate{border:1px solid var(--border);border-radius:12px;margin-bottom:12px;max-width:620px;}
  .gate-h{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px;}
  .gate-h .gt{font-weight:600;font-size:15px;}
  .gate-h .gm{font-size:13px;color:var(--muted);margin-top:2px;}
  .gate-b{border-top:1px solid var(--border);padding:12px 14px;}
  .gate-row{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;padding:9px 0;border-top:1px solid var(--border);}
  .gate-row:first-child{border-top:none;}
  .gate-row .gn{font-size:14px;} .gate-row .gu{font-size:12px;color:var(--muted);}

  /* login mock */
  .login-box{border:1px solid var(--border);border-radius:12px;padding:20px;max-width:620px;margin-bottom:16px;}
  .login-box h4{margin:0 0 6px;font-size:15px;font-weight:600;}
  .login-box p{margin:0 0 12px;font-size:13px;color:var(--muted);}
  .known{background:var(--ok-soft);border:1px solid #BBE7D4;border-radius:10px;padding:14px 16px;font-size:14px;max-width:620px;margin-bottom:16px;}
  .known b{color:var(--ink);}

  /* confirm */
  .confirm .ref{display:inline-block;border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-family:ui-monospace,monospace;font-size:14px;margin:12px 0 22px;}
  .next-steps{border-top:1px solid var(--border);padding-top:22px;margin-top:24px;max-width:620px;}
  .next-steps h4{margin:0 0 12px;font-size:14px;font-weight:600;}
  .next-steps ol{margin:0;padding-left:20px;color:var(--muted);} .next-steps li{padding:4px 0;}

  /* modal */
  .modal-back{position:fixed;inset:0;background:rgba(26,26,26,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;}
  .modal{background:var(--bg);border:1px solid var(--border);border-radius:12px;max-width:480px;width:100%;padding:28px;max-height:90vh;overflow-y:auto;}
  .modal h3{margin:0 0 8px;font-size:18px;font-weight:600;}
  .modal .ph{height:120px;background:linear-gradient(135deg,#E9EDF5,#D7DDEA);border-radius:10px;margin-bottom:14px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:20px;}

  /* werkbank */
  .admin-shell{display:grid;grid-template-columns:250px 1fr;min-height:700px;}
  .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:24px 0;}
  .sb-brand{padding:0 24px 18px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;}
  .sb-title{padding:14px 24px 6px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
  .nav{display:flex;justify-content:space-between;align-items:center;padding:9px 24px;font-size:14px;cursor:pointer;border-left:2px solid transparent;}
  .nav:hover{background:var(--bg);} .nav.on{color:var(--accent);font-weight:500;background:var(--bg);border-left-color:var(--accent);}
  .nav .c{font-size:12px;color:var(--muted);} .nav.on .c{color:var(--accent);}
  .admin-main{padding:24px 32px;background:var(--bg);overflow:hidden;}
  .admin-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:16px;flex-wrap:wrap;}
  .admin-head h2{margin:0;font-size:22px;font-weight:600;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{border:1px solid var(--border);border-radius:999px;padding:6px 14px;font-size:13px;background:var(--bg);color:var(--ink);cursor:pointer;}
  .chip.on{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .search{width:260px;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th,td{text-align:left;padding:12px;border-bottom:1px solid var(--border);}
  th{font-weight:500;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;}
  tbody tr{cursor:pointer;} tbody tr:hover{background:var(--surface);}
  .ref{font-family:ui-monospace,monospace;font-size:12px;color:var(--muted);}
  .path-tag{font-size:11px;border:1px solid var(--border);border-radius:999px;padding:1px 8px;color:var(--muted);margin-left:6px;}
  .st-new{color:var(--accent);font-weight:500;} .st-pending{color:var(--ink);} .st-ok{color:var(--muted);}
  .empty{padding:32px;text-align:center;color:var(--muted);}

  .back{background:transparent;border:none;color:var(--accent);cursor:pointer;font-size:14px;padding:0 0 16px;}
  .dhead{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:20px;gap:20px;flex-wrap:wrap;}
  .dhead h3{margin:0 0 4px;font-size:20px;font-weight:600;}
  .dactions{display:flex;gap:8px;flex-wrap:wrap;}
  .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:760px;}
  @media(max-width:760px){.edit-grid{grid-template-columns:1fr;} .admin-shell{grid-template-columns:1fr;}}
  .edit-field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px;font-weight:600;}
  .edit-field .input{font-size:14px;padding:8px 12px;}
  .edit-full{grid-column:1 / -1;}
  .save-row{display:flex;gap:10px;align-items:center;margin-top:16px;}
  .saved-note{font-size:13px;color:var(--ok);}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:8px;font-size:14px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.on{opacity:1;}
  .muted{color:var(--muted);} .small{font-size:13px;}
  .hr{height:1px;background:var(--border);margin:22px 0;max-width:620px;}
</style>
</head>
<body>

<div class="demo-bar">
  <span class="demo-label">Prototype <span class="vbadge">V2</span> nieuwe flow</span>
  <div class="demo-tabs">
    <button class="demo-tab active" data-role="klant">Aanvraag (klant)</button>
    <button class="demo-tab" data-role="werkbank">Werkbank (Isabelle)</button>
  </div>
  <button class="demo-reset" id="reset">Reset</button>
</div>

<!-- ============ KLANT ============ -->
<div class="app" data-role-view="klant">
  <div class="app-top"><div class="app-brand">Pianofabriek · zaalverhuur</div><div class="lang"><button class="active">NL</button><button data-fr>FR</button><button data-fr>EN</button></div></div>
  <div class="body">
    <div class="prog" id="prog"></div>
    <div id="stepHost"></div>
  </div>
</div>

<!-- ============ WERKBANK ============ -->
<div class="app" data-role-view="werkbank" hidden style="padding:0;">
  <div class="admin-shell">
    <aside class="sidebar">
      <div class="sb-brand">Pianofabriek · overzicht</div>
      <div class="sb-title">Aanvragen</div>
      <div id="navFilters"></div>
    </aside>
    <div class="admin-main">
      <div data-admin="list">
        <div class="admin-head"><h2 id="listTitle">Alle aanvragen</h2><input class="input search" id="search" placeholder="Zoek op naam, ref of activiteit..."></div>
        <div class="filters" id="typeFilters"></div>
        <table><thead><tr><th>Ref</th><th>Aanvrager</th><th>Activiteit</th><th>Data</th><th>Pers</th><th>Status</th></tr></thead><tbody id="rows"></tbody></table>
      </div>
      <div data-admin="detail" hidden>
        <button class="back" id="back">‹ Terug naar overzicht</button>
        <div class="dhead">
          <div><h3 id="dTitle"></h3><div class="ref" id="dRef"></div></div>
          <div class="dactions">
            <button class="btn btn-sec" id="aRefuse">Weigeren</button>
            <button class="btn btn-sec" id="aAlt">Alternatief</button>
            <button class="btn btn-prim" id="aAccept">Aanvaarden</button>
          </div>
        </div>
        <p class="small muted" style="margin-top:-6px;">Alle velden zijn bewerkbaar. Pas aan wanneer de klant een wijziging doorgeeft en bewaar.</p>
        <div class="edit-grid" id="editGrid"></div>
        <div class="save-row"><button class="btn btn-prim" id="saveDossier">Wijzigingen bewaren</button><span class="saved-note" id="savedNote"></span></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $=(s,sc)=>(sc||document).querySelector(s);
const $$=(s,sc)=>Array.from((sc||document).querySelectorAll(s));
function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),2400);}
function euro(n){return (Math.round(n*100)/100).toString().replace('.',',')+' €';}

// ===== data =====
const ROOMS=[
  {n:'Arenberg',type:'Theaterzaal',cap:120,feat:'podium, licht en geluid'},
  {n:'Brazzaville',type:'Feestzaal',cap:80,feat:'flexibel, catering mogelijk'},
  {n:'Charleroi',type:'Conferentieruimte',cap:60,feat:'klein podium'},
  {n:'Zabriskie Point',type:'Bioscoopzaal',cap:50,feat:'projectie'},
  {n:'Calcutta',type:'Vergaderzaal',cap:30,feat:'beamer, daglicht'},
  {n:'Dakar',type:'Atelier',cap:20,feat:'daglicht, wasbak'},
  {n:'Casablanca I',type:'Vergaderzaal',cap:16,feat:'beamer'},
  {n:'Casablanca II',type:'Vergaderzaal',cap:16,feat:'beamer'},
  {n:'Dublin',type:'Repetitieruimte',cap:15,feat:'spiegels, parket'},
];
// gesimuleerde Yesplan-bezetting: per datum welke zalen bezet zijn
const BUSY={'2026-05-14':['Calcutta','Dakar','Charleroi'],'2026-05-20':['Arenberg'],'2026-06-17':['Calcutta','Casablanca I','Brazzaville']};
// technisch per type (relevante opties)
const TECH_BY_TYPE={
  'Vergadering':[{n:'Beamer',p:20},{n:'Flipchart',p:8}],
  'Opleiding':[{n:'Beamer',p:20},{n:'Flipchart',p:8},{n:'Micro en versterkt geluid',p:20}],
  'Receptie':[{n:'Micro en versterkt geluid',p:20},{n:'Permanentie podiumtechnicus',p:20,uur:true}],
  'Repetitie':[{n:'Micro en versterkt geluid',p:20}],
  'default':[{n:'Beamer',p:20},{n:'Flipchart',p:8},{n:'Micro en versterkt geluid',p:20}]
};
const DRINKS=[{n:'Thermos koffie (10 koppen)',p:8},{n:'Thermos thee (10 koppen)',p:8},{n:'Plat water 1 L',p:3},{n:'Bruisend water 1 L',p:3},{n:'Fruitsap bio 1 L',p:3}];
const LUNCH=[{v:'Broodjesassortiment',p:5.5},{v:'Broodjes met soep',p:8},{v:'Lunchbuffet',p:15},{v:'Dagschotel',p:8}];

// bestaande klant (login mock)
const KNOWN={org:'Kenniscentrum Pleegzorg vzw',vat:'BE 0123.456.789',addr:'Stapelplein 28, 9000 Gent',contact:'Suzan de Hoog',email:'suzan.dehoog@kenniscentrumpleegzorg.be',phone:'+32 490 66 26 98'};

// ===== wizard state =====
const S={ type:null, people:20, dayMode:'een', date:'2026-05-20', start:'09:00', end:'16:00',
  room:null, tech:{}, drinkOn:false, drinks:{}, lunchOn:false, lunchFormule:'Broodjesassortiment', lunchPeople:20,
  desc1:'', desc2:'', desc3:'', loggedIn:false, org:'', vat:'', addr:'', contact:'', email:'', phone:'', extra:'' };

function isContactPath(){ return S.type==='Conferentie' || S.dayMode==='meer'; }

// step order differs per path
function steps(){
  const base=['type','people','when'];
  if(isContactPath()) return base.concat(['describe','details','done']);
  return base.concat(['rooms','tech','food','details','done']);
}
let stepIdx=0;
function curStep(){ return steps()[stepIdx]; }

function renderProg(){
  const arr=steps(); const host=$('#prog'); host.innerHTML='';
  arr.forEach((s,i)=>{ const d=document.createElement('div'); d.className='dot'+(i<=stepIdx?' on':''); host.appendChild(d); });
}

function go(delta){ stepIdx+=delta; if(stepIdx<0)stepIdx=0; const arr=steps(); if(stepIdx>arr.length-1)stepIdx=arr.length-1; render(); }
function jumpTo(name){ const arr=steps(); const i=arr.indexOf(name); if(i>=0){stepIdx=i;render();} }

// ===== render each step =====
function render(){
  renderProg();
  const s=curStep(); const host=$('#stepHost'); host.innerHTML='';
  ({type:rType,people:rPeople,when:rWhen,rooms:rRooms,tech:rTech,food:rFood,describe:rDescribe,details:rDetails,done:rDone})[s]();
  window.scrollTo(0,0);
}

function navRow(backLabel, nextLabel, onNext, nextDisabled){
  const wrap=document.createElement('div'); wrap.className='actions';
  const b=document.createElement('button'); b.className='btn-text'; b.textContent=backLabel||'‹ Terug'; b.disabled=stepIdx===0; b.onclick=()=>go(-1);
  const n=document.createElement('button'); n.className='btn btn-prim'; n.textContent=nextLabel||'Volgende ›'; if(nextDisabled)n.disabled=true; n.onclick=onNext;
  wrap.appendChild(b); wrap.appendChild(n); return wrap;
}

function rType(){
  const host=$('#stepHost');
  host.innerHTML=`<h3 class="q">Wat wil je organiseren?</h3><p class="qsub">We vertrekken vanuit het type activiteit. Daarna stemmen we de juiste stappen af.</p>`;
  const types=[
    {v:'Vergadering',d:'Overleg, bestuur, syndic'},
    {v:'Opleiding',d:'Cursus, workshop, training'},
    {v:'Receptie',d:'Borrel, netwerkmoment'},
    {v:'Repetitie',d:'Dans, muziek, oefening'},
    {v:'Conferentie',d:'Groot, meerdere zalen, publiek'},
    {v:'Iets anders',d:'Vertel het ons'},
  ];
  const cards=document.createElement('div'); cards.className='cards';
  types.forEach(t=>{
    const c=document.createElement('div'); c.className='opt-card'+(S.type===t.v?' sel':'');
    c.innerHTML=`<div class="t">${t.v}</div><div class="d">${t.d}</div>`;
    c.onclick=()=>{ S.type=t.v; render(); };
    cards.appendChild(c);
  });
  host.appendChild(cards);
  if(S.type==='Conferentie'){
    const note=document.createElement('div'); note.className='notice contact';
    note.innerHTML='<div class="nl">Grotere events plannen we samen</div>Een conferentie vraagt menselijke planning. We vragen je straks een korte beschrijving en je gegevens, en nemen daarna persoonlijk contact op.';
    host.appendChild(note);
  }
  host.appendChild(navRow(null,'Volgende ›',()=>{ if(!S.type){toast('Kies een type');return;} go(1); }, !S.type));
}

function rPeople(){
  const host=$('#stepHost');
  host.innerHTML=`<h3 class="q">Voor hoeveel personen?</h3><p class="qsub">Dit bepaalt mee welke zalen passen.</p>`;
  const f=document.createElement('div'); f.className='field';
  f.innerHTML=`<div class="stepper-num"><button data-d="-1">−</button><input id="people" value="${S.people}" inputmode="numeric"><button data-d="1">+</button></div>`;
  host.appendChild(f);
  $('#people').addEventListener('input',e=>{S.people=parseInt(e.target.value||'0',10)||0;});
  f.querySelectorAll('button').forEach(b=>b.onclick=()=>{S.people=Math.max(1,S.people+parseInt(b.dataset.d,10));$('#people').value=S.people;});
  host.appendChild(navRow(null,'Volgende ›',()=>go(1)));
}

  ['price','Prijs',1],['desc','Omschrijving',2],['extra','Extra info',2]
];
function openDetail(id){
  curId=id; const r=byId(id);
  $('#dTitle').textContent=r.activity+' · '+r.orgShort;
  $('#dRef').textContent=r.ref+' · '+(r.path==='contact'?'samen plannen':'directe boeking')+' · '+SMETA[r.status].l;
  $('#editGrid').innerHTML=FIELDS.map(f=>{
    const full=f[2]===2?' edit-full':''; const val=(r[f[0]]!==undefined?r[f[0]]:'');
    const big=f[2]===2;
    return `<div class="edit-field${full}"><label>${f[1]}</label>${big?`<textarea class="input" data-k="${f[0]}">${val}</textarea>`:`<input class="input" data-k="${f[0]}" value="${(''+val).replace(/"/g,'&quot;')}">`}</div>`;
  }).join('');
  $('#savedNote').textContent='';
  setAdmin('detail');
}
$('#saveDossier').onclick=()=>{
  const r=byId(curId);
  $$('#editGrid [data-k]').forEach(el=>{ let v=el.value; if(el.dataset.k==='people')v=parseInt(v||'0',10)||0; r[el.dataset.k]=v; });
  r.orgShort=(r.org||'').replace(/ vzw| asbl/i,'');
  $('#savedNote').textContent='Bewaard. Het dossier is bijgewerkt.';
  renderRows(); toast('Dossier bijgewerkt');
};
$('#back').onclick=()=>{ setAdmin('list'); renderNav(); renderRows(); };
$('#aAccept').onclick=()=>{ const r=byId(curId); r.status='goedgekeurd'; if(!r.room)r.room='(zaal toewijzen)'; openDetail(curId); renderRows(); toast('Aanvaard, mail naar klant'); };
$('#aAlt').onclick=()=>{ const r=byId(curId); r.status='alternatief'; renderRows(); toast('Alternatief voorgesteld'); setAdmin('list'); };
$('#aRefuse').onclick=()=>{ const r=byId(curId); r.status='geweigerd'; renderRows(); toast('Afwijzing verstuurd'); setAdmin('list'); };

// ===== wizard reset / demo =====
function resetWizard(){
  Object.assign(S,{type:null,people:20,dayMode:'een',date:'2026-05-20',start:'09:00',end:'16:00',room:null,tech:{},drinkOn:false,drinks:{},lunchOn:false,lunchFormule:'Broodjesassortiment',lunchPeople:20,desc1:'',desc2:'',desc3:'',loggedIn:false,org:'',vat:'',addr:'',contact:'',email:'',phone:'',extra:''});
  stepIdx=0;
}
$$('.demo-tab').forEach(b=>b.onclick=()=>setRole(b.dataset.role));
$('#reset').onclick=()=>location.reload();
document.addEventListener('click',e=>{ if(e.target.closest('[data-fr]')) toast('NL / FR / EN is een beslispunt. In de demo tonen we NL.'); });

// init
renderNav(); renderRows();
setRole('klant'); render();
